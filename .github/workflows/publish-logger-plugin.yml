name: publish-logger-plugin

on:
  push:
    tags:
      - 'snakesee-logger-[0-9]+.[0-9]+.[0-9]+'

env:
  UV_VERSION: 0.8.22

jobs:
  on-main-branch-check:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.contains_tag.outputs.retval }}
    steps:
      - name: git config --global remote.origin.followRemoteHEAD never
        run: git config --global remote.origin.followRemoteHEAD never

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: rickstaa/action-contains-tag@v1
        id: contains_tag
        with:
          reference: "main"
          tag: "${{ github.ref_name }}"

  tests:
    name: tests
    needs: on-main-branch-check
    if: ${{ needs.on-main-branch-check.outputs.on_main == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        PYTHON_VERSION: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: "${{ matrix.PYTHON_VERSION }}"
          enable-cache: true
          cache-suffix: "logger-${{ matrix.PYTHON_VERSION }}"

      - name: Install dependencies
        working-directory: snakemake-logger-plugin-snakesee
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        working-directory: snakemake-logger-plugin-snakesee
        run: pytest tests/ -v

  build-sdist:
    name: build source distribution
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: "3.12"
          enable-cache: true

      - name: Build package
        working-directory: snakemake-logger-plugin-snakesee
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: logger-plugin-sdist
          path: snakemake-logger-plugin-snakesee/dist/*.tar.gz

  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: build-sdist
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: packages
          pattern: 'logger-plugin-*'
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/
          skip-existing: true
          verbose: true

  make-github-release:
    runs-on: ubuntu-latest
    environment: github
    permissions:
      contents: write
    needs: publish-to-pypi
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "snakemake-logger-plugin-snakesee ${{ github.ref_name }}"
          body: |
            Release of snakemake-logger-plugin-snakesee ${{ github.ref_name }}

            ```bash
            pip install snakemake-logger-plugin-snakesee
            ```
          draft: false
          prerelease: false
